{% extends 'base.html' %}
{% block body %}
<main class="page-wrap container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="glass-card p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-3"><div><h1 class="h3 fw-bold mb-1">New Audit</h1><p class="text-muted mb-0">Enter a website URL to generate a report.</p></div></div>
        <form id="auditForm" class="d-grid gap-3">
          <input class="form-control form-control-lg" type="url" id="auditUrl" placeholder="https://example.com" required>
          <button class="btn btn-primary btn-lg" type="submit">Analyze Website</button>
        </form>
        <div id="auditLoader" class="loading-panel d-none mt-4"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
