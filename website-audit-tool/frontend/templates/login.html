{% extends 'base.html' %}
{% block body %}
<main class="auth-screen d-flex align-items-center justify-content-center">
  <div class="auth-card glass-card p-4 p-md-5 shadow-lg" data-aos="zoom-in">
    <h1 class="fw-bold mb-2">Welcome back</h1>
    <p class="text-muted mb-4">Sign in to access your audits and reports.</p>
    <form id="loginForm" class="d-grid gap-3">
      <input class="form-control form-control-lg" type="email" id="loginEmail" placeholder="Email" required>
      <input class="form-control form-control-lg" type="password" id="loginPassword" placeholder="Password" required>
      <div class="d-flex justify-content-between align-items-center small text-muted">
        <label class="form-check-label"><input class="form-check-input me-2" type="checkbox"> Remember me</label>
        <a href="#" class="link-secondary text-decoration-none">Forgot password?</a>
      </div>
      <button class="btn btn-primary btn-lg" type="submit">Login</button>
    </form>
    <p class="mt-4 mb-0 text-muted">New here? <a href="/register">Create an account</a></p>
  </div>
</main>
{% endblock %}
